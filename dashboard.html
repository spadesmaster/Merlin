<!DOCTYPE html>
<html>
<title>Merlin Party Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<body class="w3-black">

<div class="w3-container w3-padding-32">
  <h1 class="w3-center w3-text-amber"><b>MERLIN PARTY DASHBOARD</b></h1>
  <p class="w3-center w3-text-gray">Tuesday, March 31, 2026</p>
</div>

<div class="w3-row-padding w3-margin-top">
  <div class="w3-col l2 m4 s12">
    <div class="w3-card w3-container w3-dark-gray w3-padding-16 w3-margin-bottom w3-border-red w3-leftbar">
      <h3 class="w3-text-red"><i class="fa fa-shield"></i> M-WAR</h3>
      <p><b>Fedex Court</b></p>
      <p class="w3-small w3-text-gray">Est: 2.0h</p>
    </div>
  </div>
  
  <div class="w3-col l2 m4 s12">
    <div class="w3-card w3-container w3-dark-gray w3-padding-16 w3-margin-bottom w3-border-blue w3-leftbar">
      <h3 class="w3-text-blue"><i class="fa fa-book"></i> M-VIZ</h3>
      <p><b>Rider Integration</b></p>
      <p class="w3-small w3-text-gray">Est: 1.5h</p>
    </div>
  </div>

  <div class="w3-col l2 m4 s12">
    <div class="w3-card w3-container w3-dark-gray w3-padding-16 w3-margin-bottom w3-border-amber w3-leftbar">
      <h3 class="w3-text-amber"><i class="fa fa-crown"></i> M-KNG</h3>
      <p><b>Workbench</b></p>
      <p class="w3-small w3-text-gray">Est: 3.0h</p>
    </div>
  </div>

  <div class="w3-col l2 m4 s12">
    <div class="w3-card w3-container w3-dark-gray w3-padding-16 w3-margin-bottom w3-border-pink w3-leftbar">
      <h3 class="w3-text-pink"><i class="fa fa-heart"></i> M-LUV</h3>
      <p><b>Unity Training</b></p>
      <p class="w3-small w3-text-gray">Est: 1.5h</p>
    </div>
  </div>

  <div class="w3-col l2 m4 s12">
    <div class="w3-card w3-container w3-dark-gray w3-padding-16 w3-margin-bottom w3-border-green w3-leftbar">
      <h3 class="w3-text-green"><i class="fa fa-bolt"></i> M-ROG</h3>
      <p><b>Errand Run</b></p>
      <p class="w3-small w3-text-gray">Est: 2.0h</p>
    </div>
  </div>
</div>

<div class="w3-container w3-padding-16">
  <div class="w3-panel w3-border w3-border-gray w3-padding-16">
    <h4 class="w3-text-amber">Schedule Overview</h4>
    <p class="w3-text-gray">Rx Refills | Daily Routines</p>
  </div>
</div>

</body>
</html>
